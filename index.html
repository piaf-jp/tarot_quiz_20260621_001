  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      RefreshCw, CheckCircle2, XCircle, ChevronRight, ChevronLeft, Play, 
      BookOpen, Sparkles, BrainCircuit, LayoutGrid, Info, ArrowDownUp, ChevronDown, ChevronUp, Home, Layers, Star, ExternalLink // ← 行の最後に ExternalLink を追加
    } from 'lucide-react';

    // ==========================================
    // データ定義セクション
    // ==========================================

    // --- タロットカードデータ (全78枚) ---
    const TAROT_DECK = [
      // 大アルカナ (22枚)
      { id: 'm0', name: '0. 愚者 (The Fool)', type: 'major', isCourt: false, up: '自由、型にはまらない、無邪気、純粋、新しい始まり', rev: '軽率、わがまま、落ちこぼれ、無責任、焦り', desc: '崖の端に立つ若者と白い犬が描かれています。未知への旅立ち、自由、リスクを恐れない純粋な心と無限の可能性を象徴しています。' },
      { id: 'm1', name: 'I. 魔術師 (The Magician)', type: 'major', isCourt: false, up: '創造、可能性、才能、チャンス、感覚、スタート', rev: '混迷、無気力、スランプ、裏切り、空回り', desc: '卓上に四大元素（ワンド、カップ、ソード、ペンタクル）が揃い、頭上に無限大のマークがあります。創造力と、何でも生み出せる無限の可能性を表します。' },
      { id: 'm2', name: 'II. 女教皇 (The High Priestess)', type: 'major', isCourt: false, up: '直感、知性、安心、満足、期待、聡明', rev: '悲観、無気力、現実逃避、疑心暗鬼、冷徹', desc: '白と黒の柱の間に座り、律法の書物を持つ女性と足元の三日月。直感、知性、隠された真理、処女性を象徴しています。' },
      { id: 'm3', name: 'III. 女帝 (The Empress)', type: 'major', isCourt: false, up: '繁栄、豊穣、母性、愛情、情熱、豊かさ', rev: '挫折、軽率、虚栄心、嫉妬、怠惰、過保護', desc: '豊かな自然の中でくつろぐ、ゆったりとした服を着た（妊娠を示唆する）女性。豊穣、母性、無条件の愛情、物質的な恵みを示します。' },
      { id: 'm4', name: 'IV. 皇帝 (The Emperor)', type: 'major', isCourt: false, up: '責任、権威、実現、成功、リーダーシップ、決断力', rev: '傲慢、身勝手、独裁的、意志薄弱、未熟', desc: '硬い石の玉座に座り、甲冑を着込んだ威厳ある王。権力、責任、社会的な基盤、父性、そして強固な意志を象徴します。' },
      { id: 'm5', name: 'V. 教皇 (The Hierophant)', type: 'major', isCourt: false, up: '慈悲、連帯、協調性、信頼、尊敬、優しさ', rev: '守旧的、束縛、躊躇、おせっかい、悪徳', desc: '信者たちに教えを説く、三位一体の冠を被った教皇と2本の鍵。伝統、規律、精神的な導き、道徳やルールを表します。' },
      { id: 'm6', name: 'VI. 恋人 (The Lovers)', type: 'major', isCourt: false, up: '誘惑と戦う、選択、調和、情熱、絆、深い結びつき', rev: '誘惑、不道徳、失恋、空回り、無視、優柔不断', desc: 'エデンの園のアダムとイヴ、そして背後の天使（大天使ラファエル）。選択、調和、深い結びつき、そして誘惑の存在を象徴しています。' },
      { id: 'm7', name: 'VII. 戦車 (The Chariot)', type: 'major', isCourt: false, up: '前進、勝利、行動力、成功、積極性、突進', rev: '暴走、挫折、自己中心、敗北、焦り', desc: '白と黒の2頭のスフィンクスを操る若き戦士。相反する力をコントロールし、勝利に向かって前進する強い意志を表します。' },
      { id: 'm8', name: 'VIII. 力 (Strength)', type: 'major', isCourt: false, up: '意思、勇気、理性、自制、実行力、不屈の精神', rev: '甘え、引っ込み思案、無気力、人任せ、優柔不断', desc: '荒ぶるライオンを優しく手なずける女性と頭上の無限大マーク。物理的な力ではなく、精神力、忍耐、愛による調和を意味します。' },
      { id: 'm9', name: 'IX. 隠者 (The Hermit)', type: 'major', isCourt: false, up: '探求、内観、悟り、慎重、思いやり、単独行動', rev: '閉鎖的、陰湿、消極的、無計画、誤解、孤立', desc: '暗闇の中で六芒星のランプを掲げ、杖をつく老人。内省、孤独な探求、真理を求める姿勢、過去からの学びを象徴しています。' },
      { id: 'm10', name: 'X. 運命の輪 (Wheel of Fortune)', type: 'major', isCourt: false, up: '転換点、幸運、チャンス、変化、結果、打開', rev: '情勢の急転落、アクシデント、すれ違い、降格', desc: '回転する車輪の周りにアヌビスやスフィンクスなどの生き物がいます。周期的な変化、避けられない運命、人生の転換点を示します。' },
      { id: 'm11', name: 'XI. 正義 (Justice)', type: 'major', isCourt: false, up: '公正、均衡、誠意、善意、両立、バランス', rev: '不正、偏見、不均衡、一方通行、モラル欠如', desc: '右手に剣、左手に天秤を持つ裁判官。公平、均衡、因果応報、そして感情に流されない客観的な判断を象徴します。' },
      { id: 'm12', name: 'XII. 吊るされた男 (The Hanged Man)', type: 'major', isCourt: false, up: '修行、忍耐、奉仕、努力、試練、自己犠牲', rev: '徒労、自暴自棄、欲望、報われない努力', desc: '木に逆さ吊りにされていますが、顔は穏やかで後光が差しています。視点の転換、自己犠牲、忍耐、そして試練からの悟りを表します。' },
      { id: 'm13', name: 'XIII. 死神 (Death)', type: 'major', isCourt: false, up: '終末、破滅、離散、終結、清算、新しい始まりへの区切り', rev: '再生、起死回生、新展開、リセット、回復', desc: '白馬に乗った骸骨の騎士の前に人々が倒れています。古いものの完全な終わりと新しい始まり、不可避の変容を意味します。' },
      { id: 'm14', name: 'XIV. 節制 (Temperance)', type: 'major', isCourt: false, up: '調和、自制、節度、順応、献身、バランス', rev: '浪費、不安定、惰性、不摂生、アンバランス', desc: '片足を水に、片足を大地につき、二つのカップで水を移し替える天使。バランス、調和、異なるものの融合と節度を象徴します。' },
      { id: 'm15', name: 'XV. 悪魔 (The Devil)', type: 'major', isCourt: false, up: '欲望、依存、束縛、堕落、裏切り、嫉妬', rev: '解放、回復、覚醒、束縛からの脱却、悪縁を切る', desc: '巨大な悪魔の下に、緩い鎖で繋がれた男女がいます。物質的執着、欲望、誘惑、そして自らが作り出した心の束縛を表します。' },
      { id: 'm16', name: 'XVI. 塔 (The Tower)', type: 'major', isCourt: false, up: '崩壊、災害、悲劇、悲惨、トラブル、予期せぬ災難', rev: '緊迫、突然のトラブル、誤解、アクシデント、不幸', desc: '王冠を戴く塔に雷が落ち、炎とともに人々が転落しています。突然の崩壊、予期せぬトラブル、古い価値観の破壊を意味します。' },
      { id: 'm17', name: 'XVII. 星 (The Star)', type: 'major', isCourt: false, up: '希望、ひらめき、願いが叶う、吉兆、理想、明るい未来', rev: '失望、絶望、無気力、高望み、見損ない', desc: '大きな星の下で、裸の女性が大地と水脈に水を注いでいます。希望、インスピレーション、浄化、そして明るい未来への導きを象徴します。' },
      { id: 'm18', name: 'XVIII. 月 (The Moon)', type: 'major', isCourt: false, up: '不安、迷い、幻滅、現実逃避、潜在的な危険、トラウマ', rev: '不安の解消、明瞭、過去からの脱却、徐々に好転', desc: '月夜に吠える犬と狼、水から這い出るザリガニが描かれています。見えない危険、潜在意識、不安、幻想、迷いを表します。' },
      { id: 'm19', name: 'XIX. 太陽 (The Sun)', type: 'major', isCourt: false, up: '成功、誕生、祝福、約束された将来、喜び、幸福', rev: '不調、落胆、衰退、堕胎、延期、失敗', desc: '大きな太陽の下で、白馬に乗った裸の子供が無邪気に喜んでいます。成功、生命力、祝福、隠し事のない明るさと幸福を象徴します。' },
      { id: 'm20', name: 'XX. 審判 (Judgement)', type: 'major', isCourt: false, up: '復活、結果、発展、覚醒、奇跡、やり直し', rev: '悔恨、行き詰まり、悪い知らせ、再起不能、未練', desc: '大天使ガブリエルのラッパの音で、人々が棺から蘇っています。復活、過去の清算と報い、最終的な決断、そして覚醒を意味します。' },
      { id: 'm21', name: 'XXI. 世界 (The World)', type: 'major', isCourt: false, up: '成就、完成、完全、総合、完璧、ハッピーエンド', rev: '未完成、中途半端、不完全、低迷、妥協', desc: '月桂樹のリースの中で踊る人物と、四隅に四大元素の象徴（獅子、牡牛、人、鷲）。完成、調和、統合、完璧なハッピーエンドを示します。' },

      // 小アルカナ：ワンド (火)
      { id: 'w1', name: 'ワンドのエース', type: 'fire', isCourt: false, up: '情熱の始まり、新しい挑戦、創造力、エネルギー', rev: 'やる気の喪失、計画の遅れ、エネルギー不足', desc: '雲の中から手が現れ、葉のついたワンド（杖）を握っています。情熱とエネルギーの源、新しい行動の始まりを象徴します。' },
      { id: 'w2', name: 'ワンドの2', type: 'fire', isCourt: false, up: '計画、展望、世界を広げる、次のステップへの準備', rev: '予期せぬトラブル、計画の頓挫、視野の狭さ', desc: '城壁から広大な海を見渡す地球儀を持った男。今の成果に満足せず、次の目標や広い世界への展望を描いている状態です。' },
      { id: 'w3', name: 'ワンドの3', type: 'fire', isCourt: false, up: '発展、ビジネスの成功、協力、未来への展望', rev: '遅延、協力不足、過去への執着、停滞', desc: '崖の上から、海を往来する船を見守る男。自分のビジネスや計画が軌道に乗り、さらなる発展と未来の展望を待つ姿です。' },
      { id: 'w4', name: 'ワンドの4', type: 'fire', isCourt: false, up: '平和、休息、祝福、安定した基盤、歓迎', rev: '不安定、平和の乱れ、未完成、休息が取れない', desc: '花飾りで飾られた4本のワンドと、背景で祝福する人々。ひとときの平和、休息、お祝い事、安定した基盤の完成を表します。' },
      { id: 'w5', name: 'ワンドの5', type: 'fire', isCourt: false, up: '競争、葛藤、スポーツ、ライバル、意見の衝突', rev: '内輪もめ、不毛な争い、疲労、競争の回避', desc: '5人の若者がワンドを振り回して揉み合っています。深刻な殺し合いではなく、競争、葛藤、スポーツ的な切磋琢磨や意見の衝突を意味します。' },
      { id: 'w6', name: 'ワンドの6', type: 'fire', isCourt: false, up: '勝利、凱旋、称賛、リーダーシップ、成功', rev: '敗北、プライドの喪失、評価されない、裏切り', desc: '月桂樹の冠を被り、白馬に乗った凱旋者と周囲の群衆。勝利、周囲からの称賛、リーダーシップの発揮、成功を象徴します。' },
      { id: 'w7', name: 'ワンドの7', type: 'fire', isCourt: false, up: '優位な立場、防衛、奮闘、信念を貫く', rev: '圧倒される、不利な立場、妥協、自信喪失', desc: '高所から下から突き上げられる6本のワンドに応戦する男。有利な立場にありながらも、地位を守るための防衛や孤軍奮闘を表します。' },
      { id: 'w8', name: 'ワンドの8', type: 'fire', isCourt: false, up: '急展開、スピーディな進行、良い知らせ、直感', rev: '停滞、遅れ、コミュニケーション不足、性急な行動', desc: '空を飛んでくる8本のワンド。人物が描かれておらず、事態の急展開、スピード、良い知らせの素早い到来を意味します。' },
      { id: 'w9', name: 'ワンドの9', type: 'fire', isCourt: false, up: '備え、警戒、粘り強さ、経験を活かす', rev: '過労、被害妄想、防衛過剰、諦め', desc: '頭に包帯を巻き、傷つきながらもワンドを持って警戒する男。過去の経験からの備え、粘り強さ、最後の試練への防衛を示します。' },
      { id: 'w10', name: 'ワンドの10', type: 'fire', isCourt: false, up: 'プレッシャー、重圧、抱え込みすぎ、過労', rev: '重荷から解放される、責任を投げ出す、限界', desc: '10本の重いワンドを一人で抱えて歩く男。成功したものの、重圧やプレッシャー、責任を抱え込みすぎている状態を象徴します。' },
      { id: 'wp', name: 'ワンドのページ', type: 'fire', isCourt: true, up: '探求心、ワクワクする知らせ、情熱的な若者', rev: '優柔不断、悪い知らせ、落ち着きがない', desc: 'ワンドを両手で持ち、興味深そうに見つめる若者。情熱の芽生え、好奇心、新しいチャレンジやワクワクする知らせを表します。' },
      { id: 'wn', name: 'ワンドのナイト', type: 'fire', isCourt: true, up: '行動力、野心、情熱的でスピーディな前進', rev: '無謀、衝動的、暴走、怒りっぽい', desc: 'ワンドを持ち、荒野を馬で駆ける若き騎士。圧倒的な行動力、スピーディな前進、野心と熱い情熱を象徴します。' },
      { id: 'wq', name: 'ワンドのクイーン', type: 'fire', isCourt: true, up: '魅力、カリスマ性、自信、明るく面倒見が良い', rev: '嫉妬、わがまま、おせっかい、感情的', desc: 'ひまわりを手にし、黒猫を伴って玉座に座る女王。太陽のような魅力、カリスマ性、明るさと自信、面倒見の良さを示します。' },
      { id: 'wk', name: 'ワンドのキング', type: 'fire', isCourt: true, up: 'カリスマ、決断力、情熱的なリーダー、権力', rev: '独裁的、厳しすぎる、傲慢、強引', desc: '火のトカゲ（サラマンダー）を足元に、玉座に座る王。強い意志、リーダーシップ、情熱をもって他者を導く権力とカリスマを表します。' },

      // 小アルカナ：カップ (水)
      { id: 'c1', name: 'カップのエース', type: 'water', isCourt: false, up: '愛の始まり、豊かな感情、喜び、受容', rev: '感情の枯渇、自己中心的、愛の欠弱、不安定', desc: '雲の中から手が現れ、水（感情）が溢れるカップを持っています。愛の始まり、豊かな感情の源、喜びと受容の心を象徴します。' },
      { id: 'c2', name: 'カップの2', type: 'water', isCourt: false, up: '愛、友情、パートナーシップ、共感、絆', rev: '不和、すれ違い、関係の悪化、別れ', desc: '互いにカップを交わす男女と、中央のカドゥケウスの杖（和解の象徴）。深い絆、愛、パートナーシップ、共感を表します。' },
      { id: 'c3', name: 'カップの3', type: 'water', isCourt: false, up: 'お祝い、コミュニティ、友情、祝賀会、喜びの共有', rev: '暴飲暴食、快楽主義、孤立、仲違い', desc: '収穫物の中で、3人の女性がカップを掲げて楽しく踊っています。お祝い、喜びの共有、豊かなコミュニティや友情を示します。' },
      { id: 'c4', name: 'カップの4', type: 'water', isCourt: false, up: '倦怠期、不満、無関心、見落とし、瞑想', rev: '新しい気づき、チャンスを掴む、動き出す', desc: '木の下で腕を組み座り込む男。雲から差し出された新しいカップ（チャンス）に気づかず、不満や無関心、倦怠感を抱えています。' },
      { id: 'c5', name: 'カップの5', type: 'water', isCourt: false, up: '喪失感、悲しみ、後悔、ネガティブな部分に目が行く', rev: '立ち直る、希望を見出す、過去を乗り越える', desc: '倒れた3つのカップを悲しげに見つめる黒マントの男。背後にある倒れていない2つのカップ（残された希望）に気づけない喪失感を表します。' },
      { id: 'c6', name: 'カップの6', type: 'water', isCourt: false, up: 'ノスタルジー、過去の思い出、幼なじみ、純粋な愛', rev: '過去への執着、未来へ進めない、トラウマ', desc: '古い庭園で、子供がもう一人の子供に花入りのカップを渡しています。ノスタルジー、過去の良い思い出、純粋さや故郷を象徴します。' },

    // ==========================================
    // ユーティリティ・共有コンポーネント

    const formatCardTitle = (name) => {
      const match = name.match(/([IVX0-9]+)?\.?\s*(.+?)\s*\((.+)\)/);
      if (match) return `${match[3]}（${match[2]}）`;
      return name;
    };

    const generateAdvice = (card, isReversed, theme) => {
      const keywords = isReversed ? card.rev.split('、') : card.up.split('、');
      const cleanKw = (kw) => kw ? kw.replace(/[「」『』【】]/g, '').trim() : '';
      const kw1 = cleanKw(keywords[0]) || '';
      const kw2 = cleanKw(keywords.length > 1 ? keywords[1] : kw1);
      const kwLast = cleanKw(keywords[keywords.length - 1] || kw1);

      switch(theme) {
        case '恋愛': return `【質問例：あの人との恋の行方は？／新しい出会いはありますか？】\n恋愛面において、「${kw1}」が重要な鍵となります。${isReversed ? '相手との関係やすれ違いに少し注意が必要な時期ですが、' : 'お互いの関係が前進していく中で、'}「${kw2}」を意識して行動することで、最終的に「${kwLast}」という状況を引き寄せる可能性が高いでしょう。`;
        case '結婚': return `【質問例：この人との結婚はどうなりますか？／結婚の時期は？】\n結婚という人生の大きな節目において、このカードは「${kw1}」というテーマを強く示唆しています。結婚への道のりや家庭を築くプロセスにおいて「${kw2}」にしっかりと向き合うことで、将来的に「${kwLast}」という形を築き上げることができるでしょう。`;
        case '未来': return `【質問例：この先の展開はどうなりますか？】\n「${kw1}」が鍵となる展開です。今後の流れとしては「${kw2}」といった要素が強まるため、最終的に「${kwLast}」という状況に向かう可能性が高いでしょう。この方向性を意識して準備を整えてみてください。`;
        case '運命': return `【質問例：私に与えられた宿命や運命の流れは？】\n大局的な運命の流れとして、今あなたには「${kw1}」というテーマが与えられています。${isReversed ? '少し抗いがたい波や停滞を感じるかもしれませんが、' : 'スムーズな導きの中で、'}「${kw2}」を経験することが成長に繋がります。`;
        case '決断': return `【質問例：どちらの道を選ぶべきですか？】\n決断の指針として、このカードは「${kw1}」を重視するようアドバイスしています。迷いが生じたときは、自分にとっての「${kwLast}」は何か？を問い直すことで、後悔のない選択ができるはずです。`;
        case '多角分析': return `【質問例：この状況を別の視点から見るとどうですか？】\n表面的な出来事の裏に、「${kw1}」という別の側面が隠れていることを指摘しています。相手の立場や異なる視座から「${kw2}」について掘り下げることで、状況を突破する糸口が見えてきます。`;
        case '深層': return `【質問例：私の心の奥底にある本当の思いは？】\nあなたの無意識の領域には「${kw1}」への強い欲求や恐れが潜んでいます。自分でも気づかないうちに「${kwLast}」を求めている（または避けている）自分を客観視することが、心の平穏をもたらします。`;
        case '年間運勢': return `【質問例：今年の総合的なテーマや運勢は？】\nこの1年間を貫くメインテーマは「${kw1}」です。時期によって波はありますが、年間を通じて「${kw2}」を心がけて過ごすことで、最終的に「${kwLast}」という実りを得ることができるでしょう。`;
        default: return "";
      }
    };

    const getCardImageUrl = (id) => {
      const baseUrl = "https://www.sacred-texts.com/tarot/pkt/img/";
      let filename = "";
      if (id.startsWith('m')) {
        const num = parseInt(id.replace('m', ''));
        filename = `ar${num.toString().padStart(2, '0')}.jpg`;
      } else {
        const suitChar = id[0];
        const valStr = id.substring(1);
        let suitPrefix = "";
        if (suitChar === 'w') suitPrefix = "wa";
        if (suitChar === 'c') suitPrefix = "cu";
        if (suitChar === 's') suitPrefix = "sw";
        if (suitChar === 'p') suitPrefix = "pe";
        let valCode = "";
        if (valStr === 'p') valCode = "pa";
        else if (valStr === 'n') valCode = "kn";
        else if (valStr === 'q') valCode = "qu";
        else if (valStr === 'k') valCode = "ki";
        else if (valStr === '1') valCode = "ac"; // ← ★この1行を追加します
        else valCode = valStr.padStart(2, '0');
        filename = `${suitPrefix}${valCode}.jpg`;
      }
      return `${baseUrl}${filename}`;
    };

    const SuitIcon = ({ type, isReversed, className = "w-12 h-12" }) => {
      const rotationClass = isReversed ? "rotate-180" : "";
      const combinedClass = `${className} ${rotationClass} transition-transform duration-500 flex items-center justify-center text-5xl`;
      switch(type) {
        case 'major': return <div className={combinedClass}>🔮</div>;
        case 'fire': return <div className={combinedClass}>🔥</div>;
        case 'water': return <div className={combinedClass}>💧</div>;
        case 'air': return <div className={combinedClass}>⚔️</div>;
        case 'earth': return <div className={combinedClass}>🪙</div>;
        default: return null;
      }
    };

    const CardDisplay = ({ card, isReversed }) => {
      const [imageError, setImageError] = useState(false);
      const imgUrl = getCardImageUrl(card.id);
      useEffect(() => { setImageError(false); }, [card.id]);

      return (
        <div className="relative w-48 h-72 md:w-60 md:h-[340px] bg-[#1a1c29] rounded-xl border-4 border-slate-600 shadow-2xl flex flex-col items-center justify-center overflow-hidden p-2 flex-shrink-0">
          <div className={`absolute top-3 left-1/2 -translate-x-1/2 px-4 py-1.5 rounded-full text-sm font-bold border z-20 backdrop-blur-md shadow-lg transition-colors duration-300 ${isReversed ? 'bg-red-900/80 border-red-500 text-red-100' : 'bg-emerald-900/80 border-emerald-500 text-emerald-100'}`}>
            {isReversed ? '逆位置 ▼' : '正位置 ▲'}
          </div>
          {!imageError ? (
            <img src={imgUrl} alt={card.name} onError={() => setImageError(true)} className={`w-full h-full object-contain transition-transform duration-500 rounded ${isReversed ? 'rotate-180' : ''}`} />
          ) : (
            <div className="flex flex-col items-center justify-center w-full h-full relative">
              <div className="absolute inset-2 border border-slate-500 rounded-lg pointer-events-none opacity-50"></div>
              <SuitIcon type={card.type} isReversed={isReversed} className="mb-4" />
            </div>
          )}
        </div>
      );
    };

    const AdviceAccordion = ({ card, isReversed, showTitle = true }) => {
      const [openTheme, setOpenTheme] = useState(null);
      // ★ ここに「恋愛」「結婚」を追加して順番も調整しました
      const themes = [ '未来', '運命', '決断','恋愛', '結婚', '多角分析', '深層', '年間運勢'];
      
      useEffect(() => { setOpenTheme(null); }, [card.id, isReversed]);

      return (
        <div className={showTitle ? "mt-6 border-t border-slate-700/50 pt-4 pb-2" : "mt-2"}>
          {showTitle && (
            <h4 className="font-bold text-amber-200 mb-4 flex items-center gap-2 text-sm md:text-base">
              <Sparkles className="w-5 h-5"/>リーディング例・助言の仕方（学習用）
            </h4>
          )}
          <div className="flex flex-col gap-2">
            {themes.map(theme => (
              <div key={theme} className="border border-slate-700 rounded-lg overflow-hidden bg-slate-800">
                <button onClick={() => setOpenTheme(openTheme === theme ? null : theme)} className="w-full px-4 py-3 flex justify-between items-center hover:bg-slate-700 transition text-left">
                  <span className="font-bold text-indigo-300 tracking-wide">【{theme}】のときの解釈</span>
                  {openTheme === theme ? <ChevronUp className="w-5 h-5 text-slate-400 flex-shrink-0"/> : <ChevronDown className="w-5 h-5 text-slate-400 flex-shrink-0"/>}
                </button>
                {openTheme === theme && (
                  <div className="p-4 bg-slate-900/80 text-slate-200 text-sm md:text-base leading-relaxed border-t border-slate-700 whitespace-pre-wrap">
                    {generateAdvice(card, isReversed, theme)}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    };

    const GeneralMeaningsAccordion = () => {
      const [openSection, setOpenSection] = useState(null);
      const toggle = (section) => setOpenSection(prev => prev === section ? null : section);

      return (
        <div className="mt-6 border-t border-slate-700/80 pt-4">
          <h4 className="text-sm font-bold text-amber-200 mb-3 flex items-center gap-2"><BookOpen className="w-4 h-4" />小アルカナの基礎知識（数と人物）</h4>
          <div className="flex flex-col gap-2">
            <div className="border border-slate-700 rounded-lg overflow-hidden bg-slate-900/50">
              <button onClick={() => toggle('number')} className="w-full px-4 py-3 flex justify-between items-center hover:bg-slate-700 transition text-left">
                <span className="font-bold text-indigo-300 text-sm">数字（1〜10）の共通する意味</span>
                {openSection === 'number' ? <ChevronUp className="w-4 h-4 text-slate-400 flex-shrink-0"/> : <ChevronDown className="w-4 h-4 text-slate-400 flex-shrink-0"/>}
              </button>
              {openSection === 'number' && (
                <div className="p-4 bg-slate-900/80 text-slate-300 text-sm leading-relaxed border-t border-slate-700">
                  <ul className="space-y-2">
                    {NUMBER_MEANINGS.map((item, idx) => (
                      <li key={idx} className="flex gap-2"><span className="font-bold text-emerald-400 min-w-[70px] flex-shrink-0">{item.num}</span><span>{item.text}</span></li>
                    ))}
                  </ul>
                </div>
              )}
            </div>
            <div className="border border-slate-700 rounded-lg overflow-hidden bg-slate-900/50">
              <button onClick={() => toggle('court')} className="w-full px-4 py-3 flex justify-between items-center hover:bg-slate-700 transition text-left">
                <span className="font-bold text-indigo-300 text-sm">人物（コートカード）の共通する意味</span>
                {openSection === 'court' ? <ChevronUp className="w-4 h-4 text-slate-400 flex-shrink-0"/> : <ChevronDown className="w-4 h-4 text-slate-400 flex-shrink-0"/>}
              </button>
              {openSection === 'court' && (
                <div className="p-4 bg-slate-900/80 text-slate-300 text-sm leading-relaxed border-t border-slate-700">
                  <ul className="space-y-3">
                    {COURT_MEANINGS.map((item, idx) => (
                      <li key={idx} className="flex flex-col"><span className="font-bold text-amber-400">{item.role}</span><span className="pl-3 border-l-2 border-slate-600 ml-1 mt-1 text-slate-400">{item.text}</span></li>
                    ))}
                  </ul>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const SpreadLayoutDisplay = ({ positions }) => {
      return (
        <div className="relative w-full aspect-square max-h-[400px] bg-slate-800 rounded-xl border-4 border-slate-700 shadow-inner overflow-hidden mb-6">
          <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMzMzIiBzdHJva2Utd2lkdGg9IjAuNSIvPgo8L3N2Zz4=')] opacity-20 pointer-events-none"></div>
          {positions.map(pos => (
            <div 
              key={pos.num}
              className={`absolute flex flex-col items-center justify-center shadow-lg transition-transform hover:scale-110 cursor-help ${pos.rotate ? 'z-10' : 'z-0'}`}
              style={{ left: `${pos.x}%`, top: `${pos.y}%`, width: '13%', height: '19%', transform: `translate(-50%, -50%) ${pos.rotate ? `rotate(${pos.rotate}deg)` : ''}` }}
              title={pos.text}
            >
              <div className="w-full h-full bg-indigo-900 border-2 border-indigo-400 rounded flex items-center justify-center shadow-[0_0_10px_rgba(99,102,241,0.3)]">
                <span className="text-white font-bold text-sm md:text-base drop-shadow-md">{pos.num}</span>
              </div>
              <span className="absolute -bottom-6 text-[10px] md:text-xs font-bold text-slate-300 whitespace-nowrap bg-slate-900/80 px-1 rounded opacity-0 md:opacity-100">{pos.text}</span>
            </div>
          ))}
        </div>
      );
    };

    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };


    // ==========================================
    // アプリ1: カード（アルカナ）学習＆クイズ
    // ==========================================
    const ArcanaApp = ({ onBackHome }) => {
      const [gameState, setGameState] = useState('settings'); 
      const [mode, setMode] = useState('study'); 
      const [questionCount, setQuestionCount] = useState(5);
      const [filters, setFilters] = useState({
        major: false, fire: false, water: false, air: false, earth: false, court: false
      });
      
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showExplanation, setShowExplanation] = useState(false);
      const [studyCards, setStudyCards] = useState([]);
      const [studyIsReversed, setStudyIsReversed] = useState(false);
      const [currentIndex, setCurrentIndex] = useState(0);

      const handleFilterChange = (key) => setFilters(prev => ({ ...prev, [key]: !prev[key] }));

      const startGame = () => {
        let filteredDeck = TAROT_DECK.filter(card => {
          if (filters.major && card.type === 'major') return true;
          if (filters.fire && card.type === 'fire') return true;
          if (filters.water && card.type === 'water') return true;
          if (filters.air && card.type === 'air') return true;
          if (filters.earth && card.type === 'earth') return true;
          if (filters.court && card.isCourt) return true;
          return false;
        });

        if (Object.values(filters).every(v => !v)) filteredDeck = [...TAROT_DECK];

        if (mode === 'quiz') {
          const shuffledDeck = shuffleArray(filteredDeck);
          const maxQuestions = Math.min(questionCount, shuffledDeck.length);
          const selectedCards = shuffledDeck.slice(0, maxQuestions);

          const questions = selectedCards.map(card => {
            const isReversed = Math.random() >= 0.5;
            const correctMeaning = isReversed ? card.rev : card.up;
            let wrongMeanings = ALL_MEANINGS.filter(m => m !== correctMeaning);
            wrongMeanings = shuffleArray(wrongMeanings).slice(0, 4);
            const options = shuffleArray([correctMeaning, ...wrongMeanings]);
            return { card, isReversed, correctMeaning, options, correctIndex: options.indexOf(correctMeaning) };
          });

          setQuizQuestions(questions);
          setCurrentIndex(0);
          setScore(0);
          setSelectedOption(null);
          setShowExplanation(false);
          setGameState('playing');
        } else {
          setStudyCards(filteredDeck);
          setCurrentIndex(0);
          setStudyIsReversed(false);
          setGameState('studying');
        }
      };

      const handleAnswer = (index) => {
        if (showExplanation) return; 
        setSelectedOption(index);
        setShowExplanation(true);
        if (index === quizQuestions[currentIndex].correctIndex) setScore(prev => prev + 1);
      };

      const handleNextQuiz = () => {
        if (currentIndex < quizQuestions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setShowExplanation(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setGameState('result');
        }
      };

      const handleNextStudy = () => {
        if (currentIndex < studyCards.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setStudyIsReversed(false); 
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      const handlePrevStudy = () => {
        if (currentIndex > 0) {
          setCurrentIndex(prev => prev - 1);
          setStudyIsReversed(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      if (gameState === 'settings') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4">
            <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700 relative mt-12">
              <button onClick={onBackHome} className="absolute -top-12 left-0 text-slate-400 hover:text-white flex items-center gap-2 transition">
                <Home className="w-5 h-5"/> ホームに戻る
              </button>

              <h1 className="text-3xl font-bold text-center mb-2 text-emerald-400 flex items-center justify-center gap-2">
                <Layers className="w-8 h-8" />カード学習
              </h1>
              <p className="text-slate-400 text-sm mb-6 text-center">学習モードと出題範囲を選択してください。<br/>未選択の場合は全78枚が対象になります。</p>

              <div className="mb-8">
                <h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">1. モードを選択</h3>
                <div className="flex gap-4">
                  <label className={`flex-1 flex justify-center items-center py-4 rounded-xl cursor-pointer transition border-2 ${mode === 'study' ? 'bg-emerald-600/20 border-emerald-500 text-emerald-300 font-bold' : 'bg-slate-900 border-slate-700 hover:bg-slate-700'}`}>
                    <input type="radio" name="mode" value="study" checked={mode === 'study'} onChange={() => setMode('study')} className="hidden" />
                    <div className="flex flex-col items-center gap-1">
                      <BookOpen className="w-6 h-6 mb-1"/><span>全て勉強する</span>
                    </div>
                  </label>
                  <label className={`flex-1 flex justify-center items-center py-4 rounded-xl cursor-pointer transition border-2 ${mode === 'quiz' ? 'bg-purple-600/20 border-purple-500 text-purple-300 font-bold' : 'bg-slate-900 border-slate-700 hover:bg-slate-700'}`}>
                    <input type="radio" name="mode" value="quiz" checked={mode === 'quiz'} onChange={() => setMode('quiz')} className="hidden" />
                    <div className="flex flex-col items-center gap-1">
                      <BrainCircuit className="w-6 h-6 mb-1"/><span>クイズに挑戦</span>
                    </div>
                  </label>
                </div>
              </div>

              <div className="mb-8">
                <h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">2. カードの種類</h3>
                <div className="grid grid-cols-2 gap-3">
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={filters.major} onChange={() => handleFilterChange('major')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">大アルカナ</span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={filters.court} onChange={() => handleFilterChange('court')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">人物 (コート)</span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition border-l-4 border-red-500">
                    <input type="checkbox" checked={filters.fire} onChange={() => handleFilterChange('fire')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">火 (ワンド)</span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition border-l-4 border-blue-500">
                    <input type="checkbox" checked={filters.water} onChange={() => handleFilterChange('water')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">水 (カップ)</span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition border-l-4 border-emerald-500">
                    <input type="checkbox" checked={filters.air} onChange={() => handleFilterChange('air')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">風 (ソード)</span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition border-l-4 border-yellow-500">
                    <input type="checkbox" checked={filters.earth} onChange={() => handleFilterChange('earth')} className="w-5 h-5 accent-emerald-500" />
                    <span className="text-sm">土 (ペンタクル)</span>
                  </label>
                </div>
                <GeneralMeaningsAccordion />
              </div>

              {mode === 'quiz' && (
                <div className="mb-8 animate-fade-in">
                  <h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">3. クイズの出題数</h3>
                  <div className="flex justify-between gap-2">
                    {[5, 10, 15, 20].map(num => (
                      <label key={num} className={`flex-1 flex justify-center items-center py-2 rounded-lg cursor-pointer transition border ${questionCount === num ? 'bg-purple-600/20 border-purple-500 text-purple-300 font-bold' : 'bg-slate-900 border-transparent hover:bg-slate-700'}`}>
                        <input type="radio" name="questionCount" value={num} checked={questionCount === num} onChange={() => setQuestionCount(num)} className="hidden" />
                        <span>{num}問</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}

              <button onClick={startGame} className={`w-full font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg ${mode === 'study' ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-900/50' : 'bg-purple-600 hover:bg-purple-500 shadow-purple-900/50'} text-white`}>
                {mode === 'study' ? <BookOpen className="w-5 h-5" /> : <Play className="w-5 h-5" />}
                {mode === 'study' ? '勉強をスタート' : 'クイズをスタート'}
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const isPerfect = score === quizQuestions.length;
        const isGood = score >= quizQuestions.length * 0.6;
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4">
            <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700 text-center relative mt-12">
              <button onClick={onBackHome} className="absolute -top-12 left-0 text-slate-400 hover:text-white flex items-center gap-2 transition">
                <Home className="w-5 h-5"/> ホームに戻る
              </button>
              <h2 className="text-3xl font-bold text-purple-400 mb-4">結果発表</h2>
              <div className="text-6xl mb-6">{isPerfect ? '🏆' : isGood ? '🎉' : '📖'}</div>
              <p className="text-2xl font-bold mb-8">{quizQuestions.length}問中 <span className="text-5xl text-white mx-2">{score}</span> 問正解！</p>
              <button onClick={startGame} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition mb-4">
                <RefreshCw className="w-5 h-5" />同じ設定でシャッフルして再挑戦
              </button>
              <button onClick={() => setGameState('settings')} className="w-full bg-transparent border border-slate-600 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition">
                設定に戻る
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'studying') {
        const currentCard = studyCards[currentIndex];
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col p-4 md:p-8 font-sans">
            <div className="flex justify-between items-center mb-6 max-w-5xl w-full mx-auto">
              <div className="text-slate-400 font-bold bg-slate-800 px-4 py-2 rounded-lg shadow-md border border-slate-700">
                カード <span className="text-white">{currentIndex + 1}</span> / {studyCards.length}
              </div>
              <div className="flex gap-2">
                <button onClick={() => setGameState('settings')} className="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">設定</button>
                <button onClick={onBackHome} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                  <Home className="w-4 h-4"/>ホーム
                </button>
              </div>
            </div>
            <div className="flex flex-col lg:flex-row gap-8 lg:gap-12 max-w-5xl w-full mx-auto flex-1 pb-10">
              <div className="w-full lg:w-1/3 flex flex-col md:flex-row lg:flex-col items-center justify-center md:justify-start lg:justify-start gap-6 pt-2">
                <CardDisplay card={currentCard} isReversed={studyIsReversed} />
                <div className="text-center md:text-left lg:text-center max-w-[280px] md:max-w-none">
                  <h3 className="text-2xl md:text-3xl font-extrabold text-amber-200 tracking-wide leading-tight drop-shadow-md">
                    {formatCardTitle(currentCard.name)}
                  </h3>
                </div>
              </div>
              <div className="w-full lg:w-2/3 flex flex-col gap-6">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className={`p-5 rounded-xl border shadow-inner transition-colors ${!studyIsReversed ? 'bg-emerald-900/40 border-emerald-500/50' : 'bg-slate-800/80 border-slate-700'}`}>
                    <h4 className="text-emerald-400 font-bold mb-3 flex items-center gap-2">▲ 正位置の意味</h4>
                    <p className="text-slate-200 leading-relaxed">{currentCard.up}</p>
                  </div>
                  <div className={`p-5 rounded-xl border shadow-inner transition-colors ${studyIsReversed ? 'bg-red-900/40 border-red-500/50' : 'bg-slate-800/80 border-slate-700'}`}>
                    <h4 className="text-red-400 font-bold mb-3 flex items-center gap-2">▼ 逆位置の意味</h4>
                    <p className="text-slate-200 leading-relaxed">{currentCard.rev}</p>
                  </div>
                </div>
                <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-700 shadow-inner">
                  <h4 className="text-amber-200 font-bold mb-3 flex items-center gap-2"><BookOpen className="w-5 h-5"/>絵柄が示す意味・シンボル</h4>
                  <p className="text-slate-200 leading-relaxed">{currentCard.desc}</p>
                </div>
                <div className="bg-slate-800/50 p-5 rounded-xl border border-slate-700 mt-2">
                  <div className="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                    <h4 className="font-bold text-indigo-300 flex items-center gap-2"><Sparkles className="w-5 h-5"/>実践リーディング例</h4>
                    <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700">
                      <button onClick={() => setStudyIsReversed(false)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${!studyIsReversed ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>正位置の場合</button>
                      <button onClick={() => setStudyIsReversed(true)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-all ${studyIsReversed ? 'bg-red-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>逆位置の場合</button>
                    </div>
                  </div>
                  <AdviceAccordion card={currentCard} isReversed={studyIsReversed} showTitle={false} />
                </div>
                <div className="flex justify-between gap-4 mt-4">
                  <button onClick={handlePrevStudy} disabled={currentIndex === 0} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition ${currentIndex === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600 shadow-md'}`}>
                    <ChevronLeft className="w-5 h-5" />前のカード
                  </button>
                  <button onClick={handleNextStudy} disabled={currentIndex === studyCards.length - 1} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition ${currentIndex === studyCards.length - 1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-500 shadow-md'}`}>
                    次のカード<ChevronRight className="w-5 h-5" />
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // クイズプレイ画面
      const q = quizQuestions[currentIndex];
      const isCorrect = selectedOption === q.correctIndex;
      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col p-4 md:p-8 font-sans">
          <div className="flex justify-between items-center mb-6 max-w-5xl w-full mx-auto">
            <div className="text-slate-400 font-bold bg-slate-800 px-4 py-2 rounded-lg shadow-md border border-slate-700">
              問題 <span className="text-white">{currentIndex + 1}</span> / {quizQuestions.length}
            </div>
            <div className="flex gap-2">
              <button onClick={startGame} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                <RefreshCw className="w-4 h-4" />リフレッシュ
              </button>
              <button onClick={onBackHome} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                <Home className="w-4 h-4"/>ホーム
              </button>
            </div>
          </div>
          <div className="flex flex-col lg:flex-row gap-8 lg:gap-12 max-w-5xl w-full mx-auto flex-1 pb-10">
            <div className="w-full lg:w-1/3 flex flex-col md:flex-row lg:flex-col items-center justify-center md:justify-start lg:justify-start gap-6 pt-2">
              <CardDisplay card={q.card} isReversed={q.isReversed} />
              <div className="text-center md:text-left lg:text-center max-w-[280px] md:max-w-none">
                <h3 className="text-2xl md:text-3xl font-extrabold text-amber-200 tracking-wide leading-tight drop-shadow-md">
                  {formatCardTitle(q.card.name)}
                </h3>
                <p className="text-slate-400 font-bold mt-2 text-lg">{q.isReversed ? '▼ 逆位置' : '▲ 正位置'}</p>
              </div>
            </div>
            <div className="w-full lg:w-2/3 flex flex-col">
              <h2 className="text-xl md:text-2xl font-bold mb-6 leading-relaxed">
                このカードの【<span className={q.isReversed ? 'text-red-400' : 'text-emerald-400'}>{q.isReversed ? '逆位置' : '正位置'}</span>】が持つ意味はどれ？
              </h2>
              <div className="flex flex-col gap-3">
                {q.options.map((opt, idx) => {
                  let btnClass = "text-left p-4 rounded-xl border-2 transition-all duration-200 text-sm md:text-base ";
                  if (!showExplanation) {
                    btnClass += "bg-slate-800 border-slate-700 hover:bg-slate-700 hover:border-purple-500 cursor-pointer shadow-md";
                  } else {
                    if (idx === q.correctIndex) btnClass += "bg-emerald-900/40 border-emerald-500 text-emerald-100 shadow-[0_0_15px_rgba(16,185,129,0.3)]";
                    else if (idx === selectedOption) btnClass += "bg-red-900/40 border-red-500 text-red-100 opacity-90";
                    else btnClass += "bg-slate-800/50 border-slate-800 opacity-40 cursor-not-allowed hidden md:block"; 
                  }
                  return (
                    <button key={idx} onClick={() => handleAnswer(idx)} disabled={showExplanation} className={btnClass}>
                      <div className="flex items-center justify-between">
                        <span>{opt}</span>
                        {showExplanation && idx === q.correctIndex && <CheckCircle2 className="w-6 h-6 text-emerald-500 flex-shrink-0 ml-2" />}
                        {showExplanation && idx === selectedOption && idx !== q.correctIndex && <XCircle className="w-6 h-6 text-red-500 flex-shrink-0 ml-2" />}
                      </div>
                    </button>
                  );
                })}
              </div>
              {showExplanation && (
                <div className={`mt-6 p-5 rounded-xl border-2 shadow-lg ${isCorrect ? 'bg-emerald-900/20 border-emerald-800/50' : 'bg-red-900/20 border-red-800/50'} animate-fade-in`}>
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                    <div>
                      <p className={`font-bold text-xl mb-2 flex items-center gap-2 ${isCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                        {isCorrect ? <CheckCircle2 className="w-6 h-6"/> : <XCircle className="w-6 h-6"/>}
                        {isCorrect ? '正解！' : '不正解...'}
                      </p>
                      <p className="text-slate-300">
                        <span className="font-bold text-amber-200">{formatCardTitle(q.card.name)}</span> の {q.isReversed ? '逆位置' : '正位置'} は<br className="hidden md:block"/>
                        「<span className="font-bold text-white">{q.correctMeaning}</span>」を意味します。
                      </p>
                    </div>
                    <button onClick={handleNextQuiz} className="w-full md:w-auto bg-white text-slate-900 px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-200 transition active:scale-95 flex-shrink-0 shadow-lg">
                      {currentIndex < quizQuestions.length - 1 ? '次の問題へ' : '結果を見る'}
                      <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>
                  <div className="bg-slate-900/60 p-4 rounded-lg mt-4 border border-slate-700">
                    <div className="mb-4">
                      <h4 className="font-bold text-indigo-300 mb-1 flex items-center gap-2 text-sm md:text-base">
                        <ArrowDownUp className="w-4 h-4"/>ちなみに、【{q.isReversed ? '正位置' : '逆位置'}】の場合は...
                      </h4>
                      <p className="text-sm text-slate-300 pl-6 leading-relaxed">{q.isReversed ? q.card.up : q.card.rev}</p>
                    </div>
                    <div className="border-t border-slate-700/50 pt-4">
                      <h4 className="font-bold text-amber-200 mb-1 flex items-center gap-2 text-sm md:text-base">
                        <BookOpen className="w-4 h-4"/> カードの絵柄が示す意味・シンボル
                      </h4>
                      <p className="text-sm text-slate-300 pl-6 leading-relaxed">{q.card.desc}</p>
                    </div>
                  </div>
                  <AdviceAccordion card={q.card} isReversed={q.isReversed} showTitle={true} />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };


    // ==========================================
    // アプリ2: スプレッド学習＆クイズ
    // ==========================================
    const SpreadApp = ({ onBackHome }) => {
      const [gameState, setGameState] = useState('settings'); 
      const [mode, setMode] = useState('study'); 
      const [questionCount, setQuestionCount] = useState(5);
      const [spreadFilters, setSpreadFilters] = useState({
        fortune: false, self: false, relations: false, problem: false
      });
      
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showExplanation, setShowExplanation] = useState(false);
      
      const [studyList, setStudyList] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);

      const handleFilterChange = (key) => setSpreadFilters(prev => ({ ...prev, [key]: !prev[key] }));

      const startGame = () => {
        let filteredSpreads = SPREADS.filter(s => {
          if (spreadFilters.fortune && s.category === '運勢') return true;
          if (spreadFilters.self && s.category === '自分自身の悩み') return true;
          if (spreadFilters.relations && s.category === '対人関係') return true;
          if (spreadFilters.problem && s.category === '問題解決') return true;
          return false;
        });

        if (Object.values(spreadFilters).every(v => !v)) filteredSpreads = [...SPREADS];

        if (mode === 'quiz') {
          const shuffled = shuffleArray(filteredSpreads);
          const maxQ = questionCount === 'all' ? shuffled.length : Math.min(questionCount, shuffled.length);
          const selected = shuffled.slice(0, maxQ);

          const questions = selected.map(spread => {
            const correctName = spread.name;
            let wrongOptions = SPREADS.filter(s => s.name !== correctName).map(s => s.name);
            wrongOptions = shuffleArray(wrongOptions).slice(0, 3); 
            const options = shuffleArray([correctName, ...wrongOptions]);
            return { spread, options, correctIndex: options.indexOf(correctName) };
          });

          setQuizQuestions(questions);
          setCurrentIndex(0);
          setScore(0);
          setSelectedOption(null);
          setShowExplanation(false);
          setGameState('playing');
        } else {
          setStudyList(filteredSpreads);
          setCurrentIndex(0);
          setGameState('studying');
        }
      };

      const handleAnswer = (index) => {
        if (showExplanation) return; 
        setSelectedOption(index);
        setShowExplanation(true);
        if (index === quizQuestions[currentIndex].correctIndex) setScore(prev => prev + 1);
      };

      const handleNextQuiz = () => {
        if (currentIndex < quizQuestions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setShowExplanation(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setGameState('result');
        }
      };

      const handleNextStudy = () => {
        if (currentIndex < studyList.length - 1) {
          setCurrentIndex(prev => prev + 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };
      const handlePrevStudy = () => {
        if (currentIndex > 0) {
          setCurrentIndex(prev => prev - 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      if (gameState === 'settings') {
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4">
            <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700 relative mt-12">
              
              <button onClick={onBackHome} className="absolute -top-12 left-0 text-slate-400 hover:text-white flex items-center gap-2 transition">
                <Home className="w-5 h-5"/> ホームに戻る
              </button>

              <h1 className="text-3xl font-bold text-center mb-2 text-indigo-400 flex items-center justify-center gap-2">
                <LayoutGrid className="w-8 h-8" />スプレッド学習
              </h1>
              <p className="text-slate-400 text-sm mb-8 text-center">タロットカードの展開法（スプレッド）を学びましょう。</p>

              <div className="mb-8">
                <h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">1. モードを選択</h3>
                <div className="flex gap-4">
                  <label className={`flex-1 flex justify-center items-center py-4 rounded-xl cursor-pointer transition border-2 ${mode === 'study' ? 'bg-emerald-600/20 border-emerald-500 text-emerald-300 font-bold' : 'bg-slate-900 border-slate-700 hover:bg-slate-700'}`}>
                    <input type="radio" name="mode" value="study" checked={mode === 'study'} onChange={() => setMode('study')} className="hidden" />
                    <div className="flex flex-col items-center gap-1">
                      <BookOpen className="w-6 h-6 mb-1"/><span>全て勉強する</span>
                    </div>
                  </label>
                  <label className={`flex-1 flex justify-center items-center py-4 rounded-xl cursor-pointer transition border-2 ${mode === 'quiz' ? 'bg-indigo-600/20 border-indigo-500 text-indigo-300 font-bold' : 'bg-slate-900 border-slate-700 hover:bg-slate-700'}`}>
                    <input type="radio" name="mode" value="quiz" checked={mode === 'quiz'} onChange={() => setMode('quiz')} className="hidden" />
                    <div className="flex flex-col items-center gap-1">
                      <BrainCircuit className="w-6 h-6 mb-1"/><span>クイズに挑戦</span>
                    </div>
                  </label>
                </div>
              </div>

              <div className="mb-8">
                <h3 className="text-sm font-bold text-slate-300 mb-2 border-b border-slate-700 pb-2">2. 得意占い（カテゴリ）</h3>
                <p className="text-xs text-slate-400 mb-3">※未選択の場合は全22種が対象になります。<br/>「★」は初心者におすすめです。</p>
                <div className="grid grid-cols-2 gap-3">
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={spreadFilters.fortune} onChange={() => handleFilterChange('fortune')} className="w-5 h-5 accent-indigo-500" />
                    <span className="text-sm">運勢 <span className="text-slate-400 text-xs">(4種)</span></span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={spreadFilters.self} onChange={() => handleFilterChange('self')} className="w-5 h-5 accent-indigo-500" />
                    <span className="text-sm">自分自身の悩み <span className="text-slate-400 text-xs">(4種)</span></span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={spreadFilters.relations} onChange={() => handleFilterChange('relations')} className="w-5 h-5 accent-indigo-500" />
                    <span className="text-sm">対人関係 <span className="text-slate-400 text-xs">(3種)</span></span>
                  </label>
                  <label className="flex items-center space-x-3 bg-slate-900 p-3 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                    <input type="checkbox" checked={spreadFilters.problem} onChange={() => handleFilterChange('problem')} className="w-5 h-5 accent-indigo-500" />
                    <span className="text-sm">問題解決 <span className="text-slate-400 text-xs">(11種)</span></span>
                  </label>
                </div>
              </div>

              {mode === 'quiz' && (
                <div className="mb-8 animate-fade-in">
                  <h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700 pb-2">3. クイズの出題数</h3>
                  <div className="flex justify-between gap-2">
                    {[3, 5, 10, 'all'].map(num => (
                      <label key={num} className={`flex-1 flex justify-center items-center py-2 rounded-lg cursor-pointer transition border ${questionCount === num ? 'bg-indigo-600/20 border-indigo-500 text-indigo-300 font-bold' : 'bg-slate-900 border-transparent hover:bg-slate-700'}`}>
                        <input type="radio" name="questionCount" value={num} checked={questionCount === num} onChange={() => setQuestionCount(num)} className="hidden" />
                        <span>{num === 'all' ? '全問' : `${num}問`}</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}

              <button 
                onClick={startGame}
                className={`w-full font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg ${mode === 'study' ? 'bg-emerald-600 hover:bg-emerald-500 shadow-emerald-900/50' : 'bg-indigo-600 hover:bg-indigo-500 shadow-indigo-900/50'} text-white`}
              >
                {mode === 'study' ? <BookOpen className="w-5 h-5" /> : <Play className="w-5 h-5" />}
                {mode === 'study' ? '勉強をスタート' : 'クイズをスタート'}
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'result') {
        const isPerfect = score === quizQuestions.length;
        const isGood = score >= quizQuestions.length * 0.6;
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4">
            <div className="bg-slate-800 p-8 rounded-2xl shadow-2xl max-w-md w-full border border-slate-700 text-center relative mt-12">
              <button onClick={onBackHome} className="absolute -top-12 left-0 text-slate-400 hover:text-white flex items-center gap-2 transition">
                <Home className="w-5 h-5"/> ホームに戻る
              </button>
              <h2 className="text-3xl font-bold text-indigo-400 mb-4">結果発表</h2>
              <div className="text-6xl mb-6">{isPerfect ? '🏆' : isGood ? '🎉' : '📖'}</div>
              <p className="text-2xl font-bold mb-8">{quizQuestions.length}問中 <span className="text-5xl text-white mx-2">{score}</span> 問正解！</p>
              <button onClick={startGame} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition mb-4">
                <RefreshCw className="w-5 h-5" />もう一度クイズをする
              </button>
              <button onClick={() => setGameState('settings')} className="w-full bg-transparent border border-slate-600 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-xl transition">
                設定に戻る
              </button>
            </div>
          </div>
        );
      }

      if (gameState === 'studying') {
        const spread = studyList[currentIndex];
        return (
          <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col p-4 md:p-8 font-sans">
            <div className="flex justify-between items-center mb-6 max-w-5xl w-full mx-auto">
              <div className="text-slate-400 font-bold bg-slate-800 px-4 py-2 rounded-lg shadow-md border border-slate-700 flex items-center gap-2">
                <LayoutGrid className="w-4 h-4"/>
                スプレッド <span className="text-white">{currentIndex + 1}</span> / {studyList.length}
              </div>
              <div className="flex gap-2">
                <button onClick={() => setGameState('settings')} className="text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">設定</button>
                <button onClick={onBackHome} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                  <Home className="w-4 h-4"/>ホーム
                </button>
              </div>
            </div>

            <div className="flex flex-col lg:flex-row gap-8 lg:gap-12 max-w-5xl w-full mx-auto flex-1 pb-10">
              <div className="w-full lg:w-5/12 flex flex-col pt-2">
                <div className="mb-4">
                   <span className="bg-indigo-900/80 text-indigo-200 text-xs font-bold px-2 py-1 rounded mb-2 inline-block border border-indigo-700">
                     カテゴリ：{spread.category}
                   </span>
                   <h3 className="text-2xl md:text-3xl font-extrabold text-amber-200 tracking-wide">
                     {spread.name}
                   </h3>
                </div>
                <SpreadLayoutDisplay positions={spread.positions} />
              </div>

              <div className="w-full lg:w-7/12 flex flex-col gap-6">
                <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-700 shadow-inner">
                  <h4 className="text-indigo-300 font-bold mb-2 flex items-center gap-2"><Info className="w-5 h-5"/>目的・適した質問</h4>
                  <p className="text-slate-200 text-lg leading-relaxed font-bold bg-slate-900/50 p-3 rounded-lg border-l-4 border-indigo-500">
                    {spread.purpose}
                  </p>
                  <h4 className="text-emerald-300 font-bold mt-4 mb-2 flex items-center gap-2"><BookOpen className="w-5 h-5"/>特徴・解説</h4>
                  <p className="text-slate-300 leading-relaxed">{spread.description}</p>
                </div>
                <div className="bg-slate-800/50 p-5 rounded-xl border border-slate-700">
                  <h4 className="font-bold text-amber-200 mb-4 flex items-center gap-2"><LayoutGrid className="w-5 h-5"/>各カードの配置と意味</h4>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {spread.positions.map(p => (
                      <div key={p.num} className="bg-slate-900/80 p-3 rounded-lg text-sm md:text-base border border-slate-700 flex items-center gap-3">
                        <span className="bg-indigo-900 text-white w-7 h-7 rounded-full flex items-center justify-center font-bold flex-shrink-0">{p.num}</span>
                        <span className="text-slate-200 font-bold">{p.text}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-700 shadow-inner">
                  <h4 className="text-pink-300 font-bold mb-2 flex items-center gap-2"><Sparkles className="w-5 h-5"/>実践リーディングのコツ</h4>
                  <p className="text-slate-300 leading-relaxed">{spread.advice}</p>
                </div>
                <div className="flex justify-between gap-4 mt-4">
                  <button onClick={handlePrevStudy} disabled={currentIndex === 0} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition ${currentIndex === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-700 text-white hover:bg-slate-600 shadow-md'}`}>
                    <ChevronLeft className="w-5 h-5" />前のスプレッド
                  </button>
                  <button onClick={handleNextStudy} disabled={currentIndex === studyList.length - 1} className={`flex-1 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition ${currentIndex === studyList.length - 1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-500 shadow-md'}`}>
                    次のスプレッド<ChevronRight className="w-5 h-5" />
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const q = quizQuestions[currentIndex];
      const isCorrect = selectedOption === q.correctIndex;
      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col p-4 md:p-8 font-sans">
          <div className="flex justify-between items-center mb-6 max-w-5xl w-full mx-auto">
            <div className="text-slate-400 font-bold bg-slate-800 px-4 py-2 rounded-lg shadow-md border border-slate-700">
              問題 <span className="text-white">{currentIndex + 1}</span> / {quizQuestions.length}
            </div>
            <div className="flex gap-2">
              <button onClick={startGame} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                <RefreshCw className="w-4 h-4" />リフレッシュ
              </button>
              <button onClick={onBackHome} className="flex items-center gap-2 text-sm bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition text-slate-300 shadow-md border border-slate-700">
                <Home className="w-4 h-4"/>ホーム
              </button>
            </div>
          </div>

          <div className="flex flex-col lg:flex-row gap-8 lg:gap-12 max-w-5xl w-full mx-auto flex-1 pb-10">
            <div className="w-full lg:w-5/12 flex flex-col pt-2">
              {!showExplanation ? (
                <div className="bg-slate-800/80 p-6 md:p-8 rounded-2xl border-2 border-indigo-500/50 shadow-[0_0_20px_rgba(99,102,241,0.2)] h-full flex flex-col justify-center">
                  <h3 className="text-xl md:text-2xl font-bold text-indigo-300 mb-6 flex items-center gap-2"><Info className="w-6 h-6"/>以下の目的・特徴を持つスプレッドはどれ？</h3>
                  <div className="space-y-6">
                    <div>
                      <h4 className="text-sm font-bold text-slate-400 mb-2">【 適した質問・目的 】</h4>
                      <p className="text-amber-200 text-lg md:text-xl font-bold leading-relaxed border-l-4 border-amber-500 pl-4 bg-slate-900/50 py-3 rounded-r-lg">
                        {q.spread.purpose}
                      </p>
                    </div>
                    <div>
                      <h4 className="text-sm font-bold text-slate-400 mb-2">【 特徴・解説 】</h4>
                      <p className="text-slate-300 leading-relaxed text-sm md:text-base">{q.spread.description}</p>
                    </div>
                  </div>
                </div>
              ) : (
                <div className="animate-fade-in">
                   <div className="mb-2 text-center lg:text-left">
                     <span className="bg-indigo-900/80 text-indigo-200 text-xs font-bold px-2 py-1 rounded inline-block border border-indigo-700">
                       カテゴリ：{q.spread.category}
                     </span>
                   </div>
                   <h3 className="text-2xl md:text-3xl font-extrabold text-amber-200 tracking-wide mb-4 text-center lg:text-left">{q.spread.name}</h3>
                  <SpreadLayoutDisplay positions={q.spread.positions} />
                </div>
              )}
            </div>

            <div className="w-full lg:w-7/12 flex flex-col justify-center">
              {!showExplanation && (
                 <h2 className="text-xl md:text-2xl font-bold mb-6 leading-relaxed">選択肢から正しいスプレッド名を選んでください。</h2>
              )}
              <div className="flex flex-col gap-3">
                {q.options.map((opt, idx) => {
                  let btnClass = "text-left p-4 md:p-5 rounded-xl border-2 transition-all duration-200 text-base md:text-lg font-bold ";
                  if (!showExplanation) {
                    btnClass += "bg-slate-800 border-slate-700 hover:bg-slate-700 hover:border-indigo-500 cursor-pointer shadow-md";
                  } else {
                    if (idx === q.correctIndex) btnClass += "bg-emerald-900/40 border-emerald-500 text-emerald-100 shadow-[0_0_15px_rgba(16,185,129,0.3)]";
                    else if (idx === selectedOption) btnClass += "bg-red-900/40 border-red-500 text-red-100 opacity-90";
                    else btnClass += "bg-slate-800/50 border-slate-800 opacity-40 cursor-not-allowed hidden lg:block"; 
                  }
                  return (
                    <button key={idx} onClick={() => handleAnswer(idx)} disabled={showExplanation} className={btnClass}>
                      <div className="flex items-center justify-between">
                        <span>{opt}</span>
                        {showExplanation && idx === q.correctIndex && <CheckCircle2 className="w-6 h-6 text-emerald-500 flex-shrink-0 ml-2" />}
                        {showExplanation && idx === selectedOption && idx !== q.correctIndex && <XCircle className="w-6 h-6 text-red-500 flex-shrink-0 ml-2" />}
                      </div>
                    </button>
                  );
                })}
              </div>

              {showExplanation && (
                <div className={`mt-6 p-5 rounded-xl border-2 shadow-lg ${isCorrect ? 'bg-emerald-900/20 border-emerald-800/50' : 'bg-red-900/20 border-red-800/50'} animate-fade-in`}>
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                    <div>
                      <p className={`font-bold text-xl mb-2 flex items-center gap-2 ${isCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                        {isCorrect ? <CheckCircle2 className="w-6 h-6"/> : <XCircle className="w-6 h-6"/>}
                        {isCorrect ? '正解！' : '不正解...'}
                      </p>
                      <p className="text-slate-300">
                        この目的・特徴を持つスプレッドは<br className="hidden md:block"/>
                        「<span className="font-bold text-white text-lg">{q.correctMeaning}</span>」です。
                      </p>
                    </div>
                    <button onClick={handleNextQuiz} className="w-full md:w-auto bg-white text-slate-900 px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-200 transition active:scale-95 flex-shrink-0 shadow-lg">
                      {currentIndex < quizQuestions.length - 1 ? '次の問題へ' : '結果を見る'}
                      <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>
                  <div className="bg-slate-800/80 p-4 rounded-lg mt-4 border border-slate-700">
                    <h4 className="font-bold text-amber-200 mb-3 flex items-center gap-2 text-sm md:text-base"><LayoutGrid className="w-4 h-4"/> このスプレッドの配置と意味</h4>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                      {q.spread.positions.map(p => (
                        <div key={p.num} className="bg-slate-900/50 p-2 rounded text-xs md:text-sm border border-slate-700 flex items-center gap-2">
                          <span className="text-indigo-300 font-bold w-4">{p.num}.</span><span className="text-slate-300">{p.text}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-slate-900/60 p-4 rounded-lg mt-4 border border-slate-700">
                    <h4 className="font-bold text-pink-300 mb-2 flex items-center gap-2 text-sm md:text-base"><Sparkles className="w-4 h-4"/> リーディングのコツ</h4>
                    <p className="text-sm text-slate-300 leading-relaxed">{q.spread.advice}</p>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };


    // ==========================================
    // ルート（トップ）アプリケーション
    // ==========================================
    function App() {
      const [appMode, setAppMode] = useState('home'); // 'home', 'arcana', 'spread'

      if (appMode === 'arcana') return <ArcanaApp onBackHome={() => setAppMode('home')} />;
      if (appMode === 'spread') return <SpreadApp onBackHome={() => setAppMode('home')} />;

      // --- トップ画面 (Home) ---
      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col items-center justify-center p-4 relative overflow-hidden">
          
          {/* ▼▼▼ 追加：ポータルへ戻るボタン ▼▼▼ */}
          <a 
            href="https://piaf-jp.github.io/synchronicity_Portal_20260613_001/"
            className="absolute top-4 left-4 md:top-8 md:left-8 z-30 flex items-center gap-2 text-slate-300 bg-slate-800/80 hover:bg-slate-700 border border-slate-600 px-4 py-2.5 rounded-xl transition-all shadow-lg text-sm font-bold hover:shadow-indigo-900/50 backdrop-blur-sm"
          >
            <ExternalLink className="w-4 h-4" />
            ポータルへ戻る
          </a>
          {/* ▲▲▲ ここまで ▲▲▲ */}

          <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-600/20 rounded-full blur-[100px] pointer-events-none"></div>
          <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>

          <div className="text-center z-10 max-w-xl w-full">
            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-400 mb-4 tracking-tight">
              🔮 タロット総合学習アプリ
            </h1>
            <p className="text-slate-400 text-lg mb-12">
              タロットカードの深い意味と、実践的な展開法（スプレッド）を体系的に学べるアプリケーションです。
            </p>

            <div className="flex flex-col gap-6">
              <button onClick={() => setAppMode('arcana')} className="group relative overflow-hidden bg-slate-800 border border-slate-700 hover:border-emerald-500 rounded-2xl p-6 transition-all duration-300 hover:shadow-[0_0_30px_rgba(16,185,129,0.2)] hover:-translate-y-1 text-left flex items-center gap-6 w-full">
                <div className="bg-emerald-900/50 p-4 rounded-xl group-hover:bg-emerald-600 transition-colors">
                  <Layers className="w-10 h-10 text-emerald-400 group-hover:text-white" />
                </div>
                <div>
                  <h2 className="text-2xl font-bold text-white mb-2">カードのアルカナを学ぶ</h2>
                  <p className="text-slate-400 text-sm leading-relaxed">全78枚（大・小アルカナ）の意味や絵柄のシンボル、実践的な解釈を学びます。</p>
                </div>
                <ChevronRight className="w-8 h-8 text-slate-600 ml-auto group-hover:text-emerald-400" />
              </button>

              <button onClick={() => setAppMode('spread')} className="group relative overflow-hidden bg-slate-800 border border-slate-700 hover:border-indigo-500 rounded-2xl p-6 transition-all duration-300 hover:shadow-[0_0_30px_rgba(99,102,241,0.2)] hover:-translate-y-1 text-left flex items-center gap-6 w-full">
                <div className="bg-indigo-900/50 p-4 rounded-xl group-hover:bg-indigo-600 transition-colors">
                  <LayoutGrid className="w-10 h-10 text-indigo-400 group-hover:text-white" />
                </div>
                <div>
                  <h2 className="text-2xl font-bold text-white mb-2">スプレッド (展開法) を学ぶ</h2>
                  <p className="text-slate-400 text-sm leading-relaxed">運勢、悩み、対人関係など、目的別のスプレッド（全22種）の配置と読み方を学びます。</p>
                </div>
                <ChevronRight className="w-8 h-8 text-slate-600 ml-auto group-hover:text-indigo-400" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    // 画面(DOM)にReactアプリをレンダリングする
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
